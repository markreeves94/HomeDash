<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Dashboard</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
    
      font-family: Arial, sans-serif;
      background: #101014;
      color: white;
      padding: 16px;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard {
    height: calc(100vh - 32px);
    display: grid;
    grid-template-columns: 3fr 1fr;
    grid-template-rows: 90px 1fr;
    gap: 14px;
}
.task {
  background: #2a2a35;
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 8px;
}

.task-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.task-circle {
  width: 14px;
  height: 14px;
  border: 2px solid #bbb;
  border-radius: 50%;
  flex-shrink: 0;
}

.task-title {
  font-size: 0.95rem;
}
.topbar {
    grid-column: 1;
    grid-row: 1;
    display: grid;
    grid-template-columns: 150px repeat(3, 1fr);
    gap: 12px;
}

.main {
    display: contents;
}

.calendar-card {
    grid-column: 1;
    grid-row: 2;
}

.sidebar {
    grid-column: 2;
    grid-row: 1 / 3;
    display: grid;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 14px;
    min-height: 0;
}

    .card {
      background: #1c1c24;
      border-radius: 18px;
      padding: 16px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
    }

    .clock {
      font-size: 2rem;
      font-weight: bold;
    }

    .small-label {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.5rem;
    }

   .weather-temp {
  font-size: 1.25rem;
  font-weight: bold;
}

.weather-text {
  color: #bbb;
  font-size: 0.85rem;
}

.weather-icon {
  font-size: 1.4rem;
  line-height: 1;
  margin-bottom: 4px;
}

.weather-alert {
  box-shadow: 0 0 0 2px rgba(246, 191, 38, 0.65);
}

    .calendar-card {
      min-height: 0;
    }

    .event, .task {
      background: #2a2a35;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .time {
      color: #7dd3fc;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .title {
      margin-top: 4px;
      font-size: 1.05rem;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 90px;
      }

      .main {
        grid-template-columns: 1fr;
      }

      body {
        overflow: auto;
      }

      .dashboard {
        height: auto;
      }
    }
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  height: calc(100% - 45px);
}

.day {
  background: #2a2a35;
  border-radius: 12px;
  padding: 10px;
}

.day strong {
  color: #7dd3fc;
  display: block;
  margin-bottom: 8px;
}
.calendar-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.calendar-title-row h2 {
  margin: 0;
}

.calendar-title-row span {
  color: #aaa;
  font-size: 0.9rem;
}

  </style>
</head>

<body>
  <div class="dashboard">

   <div class="topbar">

  <div class="card">
    <div class="small-label">Time</div>
    <div class="clock" id="clock">--:--</div>
  </div>
   <div class="card weather-card" id="weather-card-0">
  <div class="small-label" id="weather-label-0">Today</div>
  <div class="weather-icon" id="weather-icon-0"></div>
  <div class="weather-temp" id="weather-temp-0">--°C</div>
  <div class="weather-text" id="weather-text-0">Loading...</div>
</div>

<div class="card weather-card" id="weather-card-1">
  <div class="small-label" id="weather-label-1">Tomorrow</div>
  <div class="weather-icon" id="weather-icon-1"></div>
  <div class="weather-temp" id="weather-temp-1">--°C</div>
  <div class="weather-text" id="weather-text-1">Loading...</div>
</div>

<div class="card weather-card" id="weather-card-2">
  <div class="small-label" id="weather-label-2">Day After</div>
  <div class="weather-icon" id="weather-icon-2"></div>
  <div class="weather-temp" id="weather-temp-2">--°C</div>
  <div class="weather-text" id="weather-text-2">Loading...</div>
</div>
    </div>
    <div class="main">
      <div class="card calendar-card">
 <div class="calendar-title-row">
  <h2 id="monthTitle">Calendar</h2>
  <span>Next 2 weeks</span>
</div>


<div class="calendar-grid"></div>
  </div>
    
</div>

      <div class="sidebar">
       <div class="card">
  <h2>Tasks today</h2>
  <div id="tasks-today"></div>
</div>

<div class="card">
  <h2>Tasks this week</h2>
  <div id="tasks-week"></div>
</div>

<div class="card">
  <h2>Tasks for later</h2>
  <div id="tasks-later"></div>
</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function updateClock() {
      const now = new Date();

      document.getElementById("clock").textContent =
        now.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit"
        });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
<script>
  const TASKS_API_URL = "https://script.google.com/macros/s/AKfycbzGgoNU-_1EkGDbfmYDZwhVmCPL4I-BIBRMEFT7N4gmLY_jUTVM5awqFCJTU3VECfbzwQ/exec";
const CALENDAR_API_URL = "https://script.google.com/macros/s/AKfycbxzkfl9PK09uKR9bgSBGiTQqLhpKJqG7T9wk_FPN8dPcRhrHjdFwrn51U3FhllGLSQ/exec"



function getGoogleColor(colorId) {
  const colors = {
    "1": "#7986CB",
    "2": "#33B679",
    "3": "#8E24AA",
    "4": "#E67C73",
    "5": "#F6BF26",
    "6": "#F4511E",
    "7": "#039BE5",
    "8": "#9AA0A6",
    "9": "#039BE5",
    "10": "#0B8043",
    "11": "#E67C73"
  };

  return colors[String(colorId).trim()] || "#666";
}
async function loadCalendar() {
    try {

  

        const response = await fetch(CALENDAR_API_URL);
        const events = await response.json();

        console.log(events);

        const grid = document.querySelector(".calendar-grid");

        if (!grid) {
            console.error("calendar-grid not found");
            return;
        }

        grid.innerHTML = "";

        const today = new Date();
        today.setHours(0,0,0,0);

        for (let i = 0; i < 14; i++) {

            const date = new Date(today);
            date.setDate(today.getDate() + i);

            const dayEvents = events.filter(event => {
    const start = new Date(event.start);
    const end = new Date(event.end);

    const dayStart = new Date(date);
    dayStart.setHours(0, 0, 0, 0);

    const dayEnd = new Date(date);
    dayEnd.setHours(23, 59, 59, 999);

    return start <= dayEnd && end > dayStart;
});

            const dayBox = document.createElement("div");
            dayBox.className = "day";

            const heading = document.createElement("strong");
            heading.textContent =
                date.toLocaleDateString("en-GB", {
                    weekday: "short",
                    day: "numeric"
                });

            dayBox.appendChild(heading);

            if (dayEvents.length > 0) {
                dayEvents.forEach(event => {

                    const p = document.createElement("p");
const colour = getGoogleColor(event.color);

console.log(event.title, event.color, colour);                   
                  
p.style.backgroundColor = colour;
p.style.setProperty("background-color", colour, "important");
p.style.color = "#fff";
p.style.padding = "6px 8px";
p.style.borderRadius = "6px";
p.style.display = "block";
p.style.margin = "4px 0";
                    if (event.allDay) {
    p.textContent = event.title;
} else {
    p.textContent =
        new Date(event.start).toLocaleTimeString("en-GB", {
            hour: "2-digit",
            minute: "2-digit"
        }) +
        " " +
        event.title;
}

                    dayBox.appendChild(p);

                });

            }

            grid.appendChild(dayBox);
        }

    } catch (err) {
        console.error(err);
    }
}

loadCalendar();
</script>
<script>
const WEATHER_LAT = 51.3420;
const WEATHER_LON = 0.7350;

const weatherCodes = {
  0: { icon: "☀️", text: "Clear" },
  1: { icon: "🌤️", text: "Clear" },
  2: { icon: "⛅", text: "Cloudy" },
  3: { icon: "☁️", text: "Cloudy" },
  45: { icon: "🌫️", text: "Fog" },
  48: { icon: "🌫️", text: "Fog" },
  51: { icon: "🌦️", text: "Drizzle" },
  53: { icon: "🌦️", text: "Drizzle" },
  55: { icon: "🌦️", text: "Drizzle" },
  61: { icon: "🌧️", text: "Rain" },
  63: { icon: "🌧️", text: "Rain" },
  65: { icon: "🌧️", text: "Heavy rain" },
  71: { icon: "❄️", text: "Snow" },
  73: { icon: "❄️", text: "Snow" },
  75: { icon: "❄️", text: "Snow" },
  80: { icon: "🌦️", text: "Showers" },
  81: { icon: "🌦️", text: "Showers" },
  82: { icon: "🌧️", text: "Showers" },
  95: { icon: "⛈️", text: "Storm" }
};

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto`;

    const response = await fetch(url);
    const data = await response.json();

    const labels = ["Today", "Tomorrow", "Day After"];

    for (let i = 0; i < 3; i++) {
      const code = i === 0 ? data.current.weather_code : data.daily.weather_code[i];
      const weather = weatherCodes[code] || { icon: "🌡️", text: "Weather" };

      const temp = i === 0
        ? Math.round(data.current.temperature_2m)
        : Math.round(data.daily.temperature_2m_max[i]);

      const high = Math.round(data.daily.temperature_2m_max[i]);
      const low = Math.round(data.daily.temperature_2m_min[i]);

      document.getElementById(`weather-label-${i}`).textContent = labels[i];
document.getElementById(`weather-icon-${i}`).textContent = weather.icon;
document.getElementById(`weather-temp-${i}`).textContent =
  `${temp}° H${high}° L${low}°`;
document.getElementById(`weather-text-${i}`).textContent = weather.text;
    }
  } catch (error) {
    console.error("Weather error:", error);
  }
}

loadWeather();
setInterval(loadWeather, 30 * 60 * 1000);
  async function loadTasks() {
  try {
    const response = await fetch(TASKS_API_URL);
    const data = await response.json();

    populateTaskList("tasks-today", data.today);
    populateTaskList("tasks-week", data.week);
    populateTaskList("tasks-later", data.later);
  } catch (error) {
    console.error("Tasks error:", error);
  }
}

function populateTaskList(id, tasks) {
  const container = document.getElementById(id);
  container.innerHTML = "";

  tasks.forEach(task => {
    const div = document.createElement("div");
    div.className = "task";
   div.innerHTML = `
  <div class="task-row">
    <span class="task-circle"></span>
    <span class="task-title">${task.title}</span>
  </div>
`;
    container.appendChild(div);
  });
}

loadTasks();
setInterval(loadTasks, 5 * 60 * 1000);
</script>
</body>
</html>
