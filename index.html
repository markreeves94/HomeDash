<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Dashboard</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
    
      font-family: Arial, sans-serif;
      background: #101014;
      color: white;
      padding: 16px;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard {
    height: calc(100vh - 32px);
    display: grid;
    grid-template-columns: 3fr 1fr;
    grid-template-rows: 90px 1fr;
    gap: 14px;
}

.topbar {
    grid-column: 1;
    grid-row: 1;
    display: grid;
    grid-template-columns: 150px repeat(3, 1fr);
    gap: 12px;
}

.main {
    display: contents;
}

.calendar-card {
    grid-column: 1;
    grid-row: 2;
}

.sidebar {
    grid-column: 2;
    grid-row: 1 / 3;
    display: grid;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 14px;
    min-height: 0;
}

    .card {
      background: #1c1c24;
      border-radius: 18px;
      padding: 16px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
    }

    .clock {
      font-size: 2rem;
      font-weight: bold;
    }

    .small-label {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.5rem;
    }

    .weather-temp {
      font-size: 1.25rem;
      font-weight: bold;
    }

    .weather-text,
    .day-text {
      color: #bbb;
      font-size: 0.95rem;
    }

    .calendar-card {
      min-height: 0;
    }

    .event, .task {
      background: #2a2a35;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .time {
      color: #7dd3fc;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .title {
      margin-top: 4px;
      font-size: 1.05rem;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 90px;
      }

      .main {
        grid-template-columns: 1fr;
      }

      body {
        overflow: auto;
      }

      .dashboard {
        height: auto;
      }
    }
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  height: calc(100% - 45px);
}

.day {
  background: #2a2a35;
  border-radius: 12px;
  padding: 10px;
}

.day strong {
  color: #7dd3fc;
  display: block;
  margin-bottom: 8px;
}
.calendar-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.calendar-title-row h2 {
  margin: 0;
}

.calendar-title-row span {
  color: #aaa;
  font-size: 0.9rem;
}

  </style>
</head>

<body>
  <div class="dashboard">

    <div class="topbar">
     <div class="card">
  <div class="small-label" id="weather-label-0">Weather</div>
  <div class="weather-temp" id="weather-temp-0">--°C</div>
  <div class="weather-text" id="weather-text-0">Loading...</div>
</div>

<div class="card">
  <div class="small-label" id="weather-label-1">Tomorrow</div>
  <div class="weather-temp" id="weather-temp-1">--°C</div>
  <div class="weather-text" id="weather-text-1">Loading...</div>
</div>

<div class="card">
  <div class="small-label" id="weather-label-2">Day After</div>
  <div class="weather-temp" id="weather-temp-2">--°C</div>
  <div class="weather-text" id="weather-text-2">Loading...</div>
</div>

    <div class="main">
      <div class="card calendar-card">
 <div class="calendar-title-row">
  <h2 id="monthTitle">Calendar</h2>
  <span>Next 2 weeks</span>
</div>


<div class="calendar-grid"></div>
  </div>
    
</div>

      <div class="sidebar">
        <div class="card">
          <h2>Tasks today</h2>
          <div class="task"><div class="title">☐ Example task</div></div>
        </div>

        <div class="card">
          <h2>Tasks this week</h2>
          <div class="task"><div class="title">☐ Example task</div></div>
        </div>

        <div class="card">
          <h2>Tasks for later</h2>
          <div class="task"><div class="title">☐ Example task</div></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function updateClock() {
      const now = new Date();

      document.getElementById("clock").textContent =
        now.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit"
        });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
<script>
</script>
<script>
const CALENDAR_API_URL = "https://script.google.com/macros/s/AKfycbxzkfl9PK09uKR9bgSBGiTQqLhpKJqG7T9wk_FPN8dPcRhrHjdFwrn51U3FhllGLSQ/exec"



function getGoogleColor(colorId) {
  const colors = {
    "1": "#7986CB",
    "2": "#33B679",
    "3": "#8E24AA",
    "4": "#E67C73",
    "5": "#F6BF26",
    "6": "#F4511E",
    "7": "#039BE5",
    "8": "#9AA0A6",
    "9": "#039BE5",
    "10": "#0B8043",
    "11": "#E67C73"
  };

  return colors[String(colorId).trim()] || "#666";
}
async function loadCalendar() {
    try {

  

        const response = await fetch(CALENDAR_API_URL);
        const events = await response.json();

        console.log(events);

        const grid = document.querySelector(".calendar-grid");

        if (!grid) {
            console.error("calendar-grid not found");
            return;
        }

        grid.innerHTML = "";

        const today = new Date();
        today.setHours(0,0,0,0);

        for (let i = 0; i < 14; i++) {

            const date = new Date(today);
            date.setDate(today.getDate() + i);

            const dayEvents = events.filter(event => {
    const start = new Date(event.start);
    const end = new Date(event.end);

    const dayStart = new Date(date);
    dayStart.setHours(0, 0, 0, 0);

    const dayEnd = new Date(date);
    dayEnd.setHours(23, 59, 59, 999);

    return start <= dayEnd && end > dayStart;
});

            const dayBox = document.createElement("div");
            dayBox.className = "day";

            const heading = document.createElement("strong");
            heading.textContent =
                date.toLocaleDateString("en-GB", {
                    weekday: "short",
                    day: "numeric"
                });

            dayBox.appendChild(heading);

            if (dayEvents.length > 0) {
                dayEvents.forEach(event => {

                    const p = document.createElement("p");
const colour = getGoogleColor(event.color);

console.log(event.title, event.color, colour);                   
                  
p.style.backgroundColor = colour;
p.style.setProperty("background-color", colour, "important");
p.style.color = "#fff";
p.style.padding = "6px 8px";
p.style.borderRadius = "6px";
p.style.display = "block";
p.style.margin = "4px 0";
                    if (event.allDay) {
    p.textContent = event.title;
} else {
    p.textContent =
        new Date(event.start).toLocaleTimeString("en-GB", {
            hour: "2-digit",
            minute: "2-digit"
        }) +
        " " +
        event.title;
}

                    dayBox.appendChild(p);

                });

            }

            grid.appendChild(dayBox);
        }

    } catch (err) {
        console.error(err);
    }
}

loadCalendar();
</script>
<script>
const WEATHER_LAT = 52.52;
const WEATHER_LON = -1.90;

const weatherCodes = {
  0: "Clear",
  1: "Mainly clear",
  2: "Partly cloudy",
  3: "Cloudy",
  45: "Fog",
  48: "Fog",
  51: "Drizzle",
  53: "Drizzle",
  55: "Drizzle",
  61: "Rain",
  63: "Rain",
  65: "Heavy rain",
  71: "Snow",
  73: "Snow",
  75: "Heavy snow",
  80: "Showers",
  81: "Showers",
  82: "Heavy showers",
  95: "Thunderstorm"
};

async function loadWeather() {
  try {
    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&current=temperature_2m,weather_code&daily=temperature_2m_max,weather_code&timezone=auto`;

    const response = await fetch(url);
    const data = await response.json();

    const temps = [
      Math.round(data.current.temperature_2m),
      Math.round(data.daily.temperature_2m_max[1]),
      Math.round(data.daily.temperature_2m_max[2])
    ];

    const codes = [
      data.current.weather_code,
      data.daily.weather_code[1],
      data.daily.weather_code[2]
    ];

    for (let i = 0; i < 3; i++) {
      document.getElementById(`weather-temp-${i}`).textContent = `${temps[i]}°C`;
      document.getElementById(`weather-text-${i}`).textContent =
        weatherCodes[codes[i]] || "Weather";
    }
  } catch (error) {
    console.error("Weather error:", error);
  }
}

loadWeather();
setInterval(loadWeather, 30 * 60 * 1000);
</script>
</body>
</html>
