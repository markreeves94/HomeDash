<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Dashboard</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #101014;
      color: white;
      padding: 16px;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard {
      height: calc(100vh - 32px);
      display: grid;
      grid-template-rows: 90px 1fr;
      gap: 14px;
    }

    .topbar {
      display: grid;
      grid-column: 1;
      grid-template-columns: 150px repeat(3, 1fr);
      gap: 12px;
    }

    .main {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap 14px;
      min-height 0;
    }

    .sidebar {
      display: grid:
      grid-template-rows: 3fr 1fr;
      gap: 14px;
      min-height: 0;
    }

    .card {
      background: #1c1c24;
      border-radius: 18px;
      padding: 16px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(0,0,0,0.25);
    }

    .clock {
      font-size: 2rem;
      font-weight: bold;
    }

    .small-label {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.5rem;
    }

    .weather-temp {
      font-size: 1.25rem;
      font-weight: bold;
    }

    .weather-text,
    .day-text {
      color: #bbb;
      font-size: 0.95rem;
    }

    .calendar-card {
      min-height: 0;
    }

    .event, .task {
      background: #2a2a35;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .time {
      color: #7dd3fc;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .title {
      margin-top: 4px;
      font-size: 1.05rem;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 90px;
      }

      .main {
        grid-template-columns: 1fr;
      }

      body {
        overflow: auto;
      }

      .dashboard {
        height: auto;
      }
    }
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 10px;
  height: calc(100% - 45px);
}

.day {
  background: #2a2a35;
  border-radius: 12px;
  padding: 10px;
}

.day strong {
  color: #7dd3fc;
  display: block;
  margin-bottom: 8px;
}
.calendar-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.calendar-title-row h2 {
  margin: 0;
}

.calendar-title-row span {
  color: #aaa;
  font-size: 0.9rem;
}

  </style>
</head>

<body>
  <div class="dashboard">

    <div class="topbar">
      <div class="card">
        <div class="small-label">Time</div>
        <div class="clock" id="clock">--:--</div>
      </div>

      <div class="card">
        <div class="small-label">Weather</div>
        <div class="weather-temp">12°C</div>
        <div class="weather-text">Mostly cloudy</div>
      </div>

      <div class="card">
        <div class="small-label">Tomorrow</div>
        <div class="weather-temp">13°C</div>
        <div class="day-text">Cloudy</div>
      </div>

      <div class="card">
        <div class="small-label">Day After</div>
        <div class="weather-temp">11°C</div>
        <div class="day-text">Rain</div>
      </div>
    </div>

    <div class="main">
      <div class="card calendar-card">
 <div class="calendar-title-row">
  <h2 id="monthTitle">Calendar</h2>
  <span>Next 2 weeks</span>
</div>


<div class="calendar-grid"></div>
  </div>
</div>

      <div class="sidebar">
        <div class="card">
          <h2>Tasks today</h2>
          <div class="task"><div class="title">☐ Example task</div></div>
        </div>

        <div class="card">
          <h2>Tasks this week</h2>
          <div class="task"><div class="title">☐ Example task</div></div>
        </div>

        <div class="card">
          <h2>Tasks for later</h2>
          <div class="task"><div class="title">☐ Example task</div></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    function updateClock() {
      const now = new Date();

      document.getElementById("clock").textContent =
        now.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit"
        });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
<script>
</script>
<script>
const CALENDAR_API_URL = "https://script.google.com/macros/s/AKfycbwHEY0UNqvGxTNkEB56-TG1QZa_miDZ7lhKWmkHmE3u7Cetzty1WgvaKP6Z4gK0z5or/exec";



function getGoogleColor(colorId) {
  const colors = {
    "1": "#7986CB",
    "2": "#33B679",
    "3": "#8E24AA",
    "4": "#E67C73",
    "5": "#F6BF26",
    "6": "#F4511E",
    "7": "#039BE5",
    "8": "#616161",
    "9": "#3F51B5",
    "10": "#0B8043",
    "11": "#D50000"
  };

  return colors[String(colorId).trim()] || "#666";
}
async function loadCalendar() {
    try {

  

        const response = await fetch(CALENDAR_API_URL);
        const events = await response.json();

        console.log(events);

        const grid = document.querySelector(".calendar-grid");

        if (!grid) {
            console.error("calendar-grid not found");
            return;
        }

        grid.innerHTML = "";

        const today = new Date();
        today.setHours(0,0,0,0);

        for (let i = 0; i < 14; i++) {

            const date = new Date(today);
            date.setDate(today.getDate() + i);

            const dayEvents = events.filter(event => {
                const eventDate = new Date(event.start);
                return eventDate.toDateString() === date.toDateString();
            });

            const dayBox = document.createElement("div");
            dayBox.className = "day";

            const heading = document.createElement("strong");
            heading.textContent =
                date.toLocaleDateString("en-GB", {
                    weekday: "short",
                    day: "numeric"
                });

            dayBox.appendChild(heading);

            if (dayEvents.length > 0) {
                dayEvents.forEach(event => {

                    const p = document.createElement("p");
p.style.borderLeft = `4px solid ${getGoogleColor(event.color)}`;
p.style.paddingLeft = "6px";
                    if (event.allDay) {
    p.textContent = event.title;
} else {
    p.textContent =
        new Date(event.start).toLocaleTimeString("en-GB", {
            hour: "2-digit",
            minute: "2-digit"
        }) +
        " " +
        event.title;
}

                    dayBox.appendChild(p);

                });

            }

            grid.appendChild(dayBox);
        }

    } catch (err) {
        console.error(err);
    }
}

loadCalendar();
</script>
</script>
</body>
</html>
